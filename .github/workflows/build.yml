name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create Android files
        run: flutter create --project-name=expense_tracker . --platforms android

      - name: Configure Android Biometrics
        run: |
          # Add Biometric Permission
          sed -i '/<application/i \    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>' android/app/src/main/AndroidManifest.xml
          
          # Update MainActivity for FragmentActivity (Required for local_auth)
          MAIN_ACTIVITY_PATH="android/app/src/main/kotlin/com/example/expense_tracker/MainActivity.kt"
          if [ -f "$MAIN_ACTIVITY_PATH" ]; then
            sed -i 's/import io.flutter.embedding.android.FlutterActivity/import io.flutter.embedding.android.FlutterFragmentActivity/' "$MAIN_ACTIVITY_PATH"
            sed -i 's/class MainActivity: FlutterActivity()/class MainActivity: FlutterFragmentActivity()/' "$MAIN_ACTIVITY_PATH"
          fi

      - name: Generate App Icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
