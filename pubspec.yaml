name: expense_tracker
description: A premium offline expense tracking application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # State Management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.66.2

  # Fonts
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.18.1

  # Security
  local_auth: ^2.1.6

  # File system
  path_provider: ^2.1.2

  # CSV Export
  csv: ^6.0.0

  # Sharing files
  share_plus: ^7.2.2

  # Unique IDs
  uuid: ^4.3.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
